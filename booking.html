<style>
  body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background-color: #111;
  color: white;
}

/* الهيدر */
header {
  background-color: #c9a23f; /* دهبي */
  text-align: center;
  padding: 20px;
}
nav a {
  color: #ffffff;
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
}

h1 {
  margin: 0;
}

/* الجدول */
table {
  margin-top: 30px;
  border-collapse: collapse;
  width: 60%;
  background-color: #1e1e1e;
}

th {
  background-color: #e4e4e4;
  color: black;
  padding: 10px;
}

td {
  padding: 10px;
  text-align: center;
  border: 1px solid #333;
}

/* الفورم */
form {
  background-color: #1e1e1e;
  display: inline-block;
  padding: 25px;
  border-radius: 10px;
  margin-top: 30px;
  box-shadow: 0 0 10px rgba(201, 162, 63, 0.4);
}

/* inputs و select */
input, select {
  width: 220px;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
  outline: none;
}

/* الزرار */
button {
  width: 240px;
  padding: 10px;
  background-color: #c9a23f;
  border: none;
  border-radius: 5px;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background-color: #e0b94f;
}

/* توسيط الجدول */
table {
  margin-left: auto;
